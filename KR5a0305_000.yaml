body:
  text: 漢武帝外傳海五武帝既聞王母至言説八方巨海之中有十洲並是人迹所不到處又始知東方朔非世俗常人是以延之曲室親問十洲所在所有之物名故帝書記之朔對云臣學仙者耳非得道之人以國家之盛美將招儒墨於名教之內抑絶俗之道於虛詭之迹臣故韜隱逸而赴王庭藏養生而侍朱闕矣亦由尊上好道且復欲抑絶其威儀也曾隨師主履行北至朱陵扶桑蜃海冥夜之丘純陽之陵始青之下月宫之淵內遊七丘中旋十洲踐赤縣而遊五嶽行陂澤而息名山臣自少及今周流六天所涉天光極於是耳未若凌虛之子飛真之官上下九天洞視百方北極鈎陳而并華蓋南翔太丹而棲大夏東之通陽之霞西薄寒穴之野日月所不逮星漢所不與其上無復物其下無復底下臣所識安及於是愧不足以酬廣訪矣武帝巡狩過河間有紫青氣自地屬天望氣者以為下當有奇女天子拜之帝使求之見一女子在空館中姿貌殊絶兩手皆拳帝令開其手數擘之手莫能舒帝於是自披手即伸由是得幸號為拳夫人進為婕妤居鉤弋宫解素女之術大有寵有娠十四月乃産是為昭帝帝曰昔堯十四月而生今鉤弋亦然乃命其門曰堯母門後至甘泉因幸告帝曰妾相運正應為陛下生一男男年七歲妾當死今年必不得歸願陛下自愛言終遂卒既殯不臰香聞十餘里因葬之雲陵帝甚哀悼又疑其非常人乃發冢開視空棺無尸唯衣履存焉乃為起通靈臺於甘泉常有青鳥集臺上往來至宣帝時乃止武帝至泰山修封禪石閭泰山道士號稷丘君識之者云且百歲而更少封日帝將上山稷丘君乃冠章甫冠衣黃衣擁琴來迎謂帝曰勿輕上山必傷足帝不從行數里石促指折乃止但祠而返淮南王好學才藝集天下道書招方士皆策神氣能雲雨百姓傳云王能致仙人與遊處變化無常或童子或老人王又能隱形飛行服氣不食帝聞而嘉其事欲受其道王不肯傳云無其事帝怒將誅淮南王王知之出令與羣臣因去不知所之國人皆云神仙或有見王者帝恐動人情乃令斬王家人首以安百姓名為淮南王收其方書亦頗得黃白之事然非其要法試之多不驗帝既感淮南之道乃徴四方有術之士自燕齊而出者數千人矣齊人李少翁年二百歲色若童子作諸方術皆有驗帝甚信之拜為文成將軍以客禮之於甘泉宫中畫太一諸神像祀之少翁云先致太一然後可得升天升天然後可至蓬萊歲餘未驗帝漸厭倦少翁又使鬼神方皆驗唯祀太一積年無應帝性急峻甚惑之而少翁愈驕矜帝怒誅之文成被誅後月餘使者藉質從關東還逢於漕亭謂使者曰為吾謝帝不能忍少日而敗大事乎帝好自愛後四十年求我於勞成山方共事不相怨也使者還具言之乃令發其棺視之無所見唯有竹筒一枚帝疑其弟子竊其尸而藏之乃收捕驗問了無蹤迹帝大悔誅復徴諸方士更於甘泉祀太一又别設一座祀文成帝親執禮會東郡送一短人長五寸衣冠具足帝疑其山精帝令在案上召方朔朔至呼短人曰巨靈汝何忽叛來阿母還未短人不對因指謂帝曰王母種桃三千年一作子此兒不良已三過偷之失王母意故被謫來此帝大驚愈知朔非世上人也短人謂帝曰王母使臣來告陛下求道之法唯有清淨不宜躁擾後五年與帝會言終不見帝愈恨又召問方朔朔曰陛下自當知臣不得説終已無言帝以其神不敢逼也齊人公孫卿謂所忠曰吾有師説祕書言鼎事欲因公奏之如得引見以玉羊一為壽所忠許之視其書而有疑謝曰寶鼎事已訣矣無所復言公孫卿乃因郿人平時奏之有札書言黃帝得寶鼎究侯問於鬼臾區對曰帝得寶鼎神華延年歲己酉朔旦冬至得天之紀終而復始於是帝迎日推算凡二十推百八十歲黃帝乃登仙于天今年得朔旦冬至與黃帝時協臣昧死奏武帝大悅召卿問卿對曰臣受此書於申公已死尸解去帝曰申公何人卿曰齊人安期先生同受黃帝言有此鼎書申公常告臣言漢之聖者在高祖之曾孫焉寶鼎出而與神通封禪得上泰山唯有黃帝漢主當上封封則能登天矣黃帝且與百鬼戰且學仙百餘歲乃得與神通黃帝郊雍祠上帝宿齋三月鬼區尸解而去因葬雍雍今大鴻冢是其後黃帝接萬靈於明庭甘泉是也升仙寒門谷口是也黃帝採首山銅鑄鼎於荆山鼎既成有龍垂胡髯下迎帝上龍羣臣及後宫從上龍者七十餘人小臣不得上乃悉持龍髯拔墜帝弓百姓仰望黃帝上天乃抱其弓與龍髯而號故後世號其冢曰鼎湖其弓曰烏號武帝於是歎曰嗟乎吾誠能及黃帝視去天下如棄士帝祠黃帝冢於喬山顧問公孫卿曰黃帝仙不死有冢何也對曰黃帝仙去羣臣思慕無已乃葬其衣冠非真冢也武帝又歎曰吾後升天羣臣亦當思慕持吾衣冠葬於東陵乎魯女生者長樂人也少好道初服餌胡麻及水絶穀八十餘年日更少壯色如桃華一日能行三百里走及麞鹿世傳見之三百餘年後採藥於嵩高山忽見一女人坐山澗中女生知是神人因叩頭再拜稽首乞長生之要良久女人曰我三天太上侍官者也汝當得仙故得見我我將授汝寶文祕要可以威制五嶽役使衆靈乃出五嶽真形圖以與之并告其施用節度女生道成一旦與親知故人别云入華山中去後五十年先相識者逢女生於華山廟前顔色更少乘白鹿從玉女三十人并令謝其鄉里親故人甚分明也其五嶽圖與王母文正同今得見於世間者豈不由李少君董仲舒及女生得之仲舒臨去以傳欒巴女生初時以圖傳薊子訓訓後傳封君達君達後入玄丘山臨去傳左元放封君達隴西人也少好道初服黃連五十餘年乃入烏鼠山又於山中服鍊水銀百餘年還鄉里年如三十者常乘青牛故號為青牛道士行聞有病殆死者識與不識便以腰間竹管中藥與服之或為下針應手皆愈世多得其效驗都不以姓字語人人通識乘青牛因以青牛為名聞魯女生得真人五嶽圖連年請求之女生後見授并具告節度君達先在人間二百餘年乃入玄丘山中不知所在臨去以五嶽真形傳左元放元放以傳葛孝先也青牛道士受魯女生言家有五嶽真形一嶽各遣五神來衛護圖書所居山川近止者川澤神又恆遣侍官防身營家凶逆欲見傷害皆反受其殃有相謀議已者五神殺凶主皆亦驗應於夢想又辟除五方五瘟水火之災可帶履鋒刃此真形冥心精加奉敬敬而甚於君父每事宜有所施行皆先於靜處燒香啓五嶽君也五君恆書道士善事又司道士之姦穢言人之不正不正者禍身姦穢者禍門是以宜深忌愼之道士帶此文形及執持以履山林者百山地源靈主皆出境拜迎形見光景防護遏惡尊貴嶽形信逮我一身鬼神猶執卑降之禮何况凡人而可慢之哉李少君字雲翼齊國臨淄人也少好道入泰山採藥修絶穀遁世全身之術道未成而病困於山林中遇安期先生經過見少君少君叩頭求乞活安期愍其有至心而被病當死乃以神樓散一匕與服之即起少君於是求隨安期奉給奴役便聽師事之安期將少君東至赤城南之羅浮北至太恆西遊玉門周流五嶽觀看江川如此數十年安期一旦語之我被玄洲召即日當去汝未應隨我至彼今當相捨去也復六百年當迎汝於此因授神丹爐火飛玄之方誓約口訣畢須臾遂乘龍虎導引數百人迎安期安期乘羽車而升天也少君於是還齋戒賣於市商估六國或時為吏或作師醫治病或時煦賃易姓改名遊行處所莫知其有道逮漢武帝之時聞帝招募方士待敬道術而先貧不辦合大藥喟然長歎語弟子曰老將至矣死將近矣而財不足用躬耕力作商估求錢必不致辦合藥又吾亦羸拙於斯事也聞天子好道請欲見之求為合丹可得恣意無求不得天子中成者成之不中教者便捨去吾在世上已五百餘年而不為一權者必不免於蟲蟻之糧矣乃以方上武帝言臣能凝汞成白銀飛丹砂成黃金金成服之白日升天神仙無窮身生朱陽之羽體備圓光之翼竦則凌天伏入無間控飛龍而八遐已遍駕白鴻而九陔立周冥海之棗大如瓜鐘山之李大如瓶臣已食之逮有先師安期先生授臣口訣是以保黃物之可成也於是引見甚尊敬之賜遺無數為立屋第武帝自謂必能使我度世者少君嘗從武安侯飲酒坐中有老人年九十餘少君言與其祖父遊射處老人為小兒時從其祖父識有此人一座盡驚少君見武帝有故銅器少君望而識之曰昔齊桓公嘗陳此器於柏寢帝按其刻果齊桓公器乃知少君數百歲人也然視之常如年五十許人面色甚好肌膚悅澤尤有光華眉目口齒似十五童子諸侯王貴人聞其能令人不死老更少壯饋遺之金錢無限乃密作神丹丹成未服又就帝求五帝六甲左右靈飛之書凡十二事帝以元封四年七月以書授少君到元封六年九月少君稱疾上表云陛下思心玄妙志甄長生於是招誘道術無遠不至精誠感靈天神斯降自非宿命所適熟能諧合然丹方禁重宜絶臭腥仙法養物仁充蠢動而陛下不能絶奢侈遠聲色殺伐不止喜怒不除萬里有不歸之魂市朝有流血之形神丹大道未可得成而臣疾與年偕今者虛瘵又不獲躬親齋戒預睹彭祖丹砂之變於此邈矣先師安期先生昔所賜金丹之方而有徴若按節度奉法戒爾乃可修用之焉若鬱砂虹飛玄朱九轉剖六一而流精奪日探霜雪而月光風卷徘徊丹霞騰沸龍虎投鉛錫而黃金克成刀圭入喉而雕氣立反爾乃駕神虬以上升騁雲車以涉遠當驗此方之神將明小臣之不妄矣乃以小丹方與帝而稱疾困非大丹方也其夜武帝夢與少君俱上嵩高山半道有繡衣使者乘龍持節從雲中下言太一請少君武帝覺即遣使者問少君消息且告近臣曰如朕夢少君將捨朕去矣明日少君臨病困武帝自往視并使左右人受其方書未竟而少君絶武帝流涕曰少君不死也故作此去耳既斂之忽失其所在中表衣帶不解如蟬蛻也於是為殯其衣物百餘日行人有見少君在河東蒲坂市者乘青騾帝聞之便發其棺棺中無所復有釘亦不脫唯餘履在耳武帝殊益懊恨求少君之不勤也明年柏梁臺火燒失諸祕書妙文也初少君與議郎董仲相親見仲宿有困疾體枯氣少乃與其成藥二劑并其方一篇用戊己之草后土脂精艮獸沉肪先莠之根百卉華醴龍銜之草亥月上旬合煎銅鼎童男童女沐浴潔清調其湯火取使合成服如雞子三枚為程服盡一劑身體便輕服盡三劑落齒更生服盡五劑命不復傾仲為人剛直博學五經然不達道術常笑世人服藥學道數上書諫武帝以為人生有命衰老有常非道術所能延益雖見其有異以為天性非術所致得其藥竟不服又不解從問其方為藏去之而已少君去後數月仲躬病甚又武帝數道其夢恨惜之仲乃憶所得少君藥試取服之未半能行身體輕壯所苦了愈藥盡氣力如三十時乃更信世間有不死之道即以去官行求道士問以方意悉不能曉然白髮皆還黑形容甚盛後八十餘乃死臨死謂子道生曰我得少君神方我不信事懷恨黃泉汝後可行求術人問解之者若長服此藥必度世也道生感父遺言遂不肯仕周旋天下求解此方到江夏遇博澤先生先生曰此乃非神丹金玉也可使人得數百年而已耳乃具為説解其方意所用物真名道生合藥服之得壽三百七十歲入雞頭山中不知竟得道不同時卓元成張子仁吳士升蔡子盛魏仲明張元達服之或得三百歲或得五百歲皆至死不病不傴面不皺理齒不落髮不白房室不廢此蓋少君凡弊方耳猶使人如此况其上方邪少君當去時密以六甲左右靈飛術十二事傳東郭延以神丹飛玄之方授少君鄉里人薊子訓者此二人後學道並得仙少君又授子訓崑崙神州真形也東郭延字公遊山陽人也少好道聞李少君有道求與相見叩頭乞得執侍巾櫛灑掃之役少君許之見延小心良謹可成臨當去密以五帝六甲左右靈飛之術遁虛招真十二事授延告之曰此亦要道也審而行之亦升天矣口訣畢而遣去延遂還家合服靈飛散能夜書在寢室中身生光照左右行六甲左右術能占吉凶天下當死者識與不識皆逆知之又役使鬼神收攝虎豹無所不為在鄉里四百歲不老漢建安二十一年一旦有數十人乘虎豹之來迎之比鄰盡見之乃與親故别而辭去云詣崑崙臺臨去先以神丹方五帝靈飛祕要傳尹先生尹先生諱軌字公度太原人也以晉元熙元年入南陽太和山中以諸要事授其弟子河內山世遠延先承少君勑初以靈飛術傳薊子訓子訓亦受傳神丹經薊遼字子訓齊國臨淄人李少君之邑人也少仕州郡舉孝廉除郎中又從軍拜駙馬都尉晚悟治世俗綜理官無益於年命也乃從少君學治病作醫法漸久見少君有不死之道遂以弟子之禮事少君而師焉少君亦以子訓用心專知可成就漸漸告之以道家事因教令胎息胎食住年止白之法行之二百餘年顔色不老在鄉里與人信讓從事性好清淨常間居讀易時作小小文疏皆有意義少君晚又授子訓無常子大幻化之術按事施行皆效曾見比舍家抱一兒從求抱之失手兒墮地即死其家素尊敬之不敢有悲哀之色而埋之謂此兒命應不成人行已積日轉不能復思之子訓因還外抱兒還家家人恐是鬼乞不復用子訓曰但取無苦故是汝兒也兒識其母喜笑欲往母乃取之意猶不了子訓既去夫歸共往掘視所埋死兒窆器中有泥兒長六寸許耳此兒遂長大又諸老人髮畢白者子訓但與之對坐共語宿昔之間則明旦皆髮黑矣亦無所施為為黑可期一年二百日也亦復有不使人髮黑者蓋神幻之大變者也京師貴人聞之莫不虛心欲見子訓而無緣致之子訓比居有年少為太學生於是諸貴人共呼語之卿所以勤苦讀書者欲以課試規富貴耳但為吾一致薊子訓來能使卿不勞而達書生許諾乃歸親事子訓朝夕灑掃立侍左右如此且二百日子訓語書生曰卿非學道者何能如此書生曰忝鄉里末流長幼之道自當爾子訓曰何以不道實而作虛飾邪吾以具知卿意諸貴人欲得見我我亦何惜一行之勞而不使卿得榮位乎便可還語諸人吾某月某日當往書生甚喜到京師具向諸貴人説此意到期日子訓未行書生父母憂之往視子訓子訓曰恐我不行邪不使卿兒失信當發以食時去所居書生父母相謂曰薊先生雖不如期至要是往也定後日書生歸推計之子訓以其日中時到京師是不能半日行千餘里既至書生往見子訓子訓問書生曰誰欲見我者書生曰欲見先生者甚多不敢枉屈但乞知先生所止自當來也子訓曰不須使來吾尚千餘里來寧復與諸人計此邪卿今日使人人盡語之使各絶賔客吾日中當往臨時自當擇所先詣書生如其言語貴人貴人各灑掃到日中子訓往凡二十三處便有二十三子訓各在一處諸貴人各各喜自謂子訓先詣之定明日相參問同時各有一子訓其衣服顔色皆如一而論説隨主人咨問各各答對不同耳主人並為設酒食之具以餉子訓皆各家家盡禮飲食之於是遠近大驚諸貴人並欲詣之子訓謂書生曰諸人謂我當有重瞳八采故欲見我我亦無所道我不復往便爾去矣適出門諸貴人冠蓋塞道到門書生言適去東陌上乘青騾者是也於是各各走馬逐之望見騾徐徐而行各馬逐之不及如此行半日而常相去一里許不可及乃各罷還子訓既少君鄉里弟子微密謹愼思證道奧隨侍明匠將足甄綜衆妙矣王真字叔堅上黨人也少為郡吏年七十乃好道尋見仙經雜言説郊間人者周宣王時郊間採薪之人也採薪而行歌曰巾金巾入天門呼長精吸玄泉鳴天鼓養泥丸時人莫能知唯柱下史曰此是活國中人其語祕矣其人乃古之漁父也何以知之八百歲人目瞳正方千歲人目理縱採薪者乃千歲之人也真讀此書而不解其旨遂搜問諸所在道士經年而遇有解其旨者語真曰此近淺之術也為可住年反白而已耳乃語訣云巾金巾者恆存肺氣入泥丸中徐徐以繞身身常光澤吸玄泉者漱其口液而服之使人不老行之七日有效鳴天鼓者朝起常叩齒三十六下使身神安又夜恆存赤氣從天門入周身內外在腦中變為火以燔身身與火同光如此存之亦名曰鍊形泥丸腦也天門口也習閉氣而吞之名曰胎息習漱舌下泉而咽之名曰胎食行之勿休也真受訣施行胎息胎食鍊形之方甚有驗斷穀二百餘年肉色充美徐行及馬力兼數人自歎曰我行此術唯可不死豈及神丹金玉之方邪乃師事薊子訓子訓授其肘後方也魏武帝聞之呼與相見見似年可三十許意嫌其虛詐定校其鄉里皆異口同辭多有少小見真者乃信其有道甚敬重之郤孟節師事真十數年真以蒸丹小餌法授孟節得度世鄉里計真已四百歲後一旦將三少妾登女几山語弟子言合丹去遂不復還真一日行三百里孟節能含棗核以不食至十年又能閉氣不息身不動搖若死人可至百日半歲亦有家室此法是真所習郊間人之法也孟節為人質謹不妄言魏武帝為立茅舍使領諸方士晉惠懷之際人故有見孟節在長安市中者魏武帝時亦善招求諸方術道士皆虛心待之但諸得道者莫肯告之以要言耳劉京字太玄南陽人也漢孝文皇帝侍郎也後棄世從邯鄲張君學道受餌朱英丸方合服之百三十歲視之如三十許人後師事薊子訓子訓授京五帝靈飛六甲十二事神仙十洲真形諸祕要京按訣行之甚效能役使鬼神立起風雨召致行厨坐在立亡而知人吉凶期日又能為人祭天益命或得十年到期皆死其不信者至期亦死周流名山五嶽與王真俱行悉遍也魏武帝時故遊行諸弟子家皇甫隆聞其有道乃隨事之以雲母九子丸及交接之道二方教隆隆按合行服之色理日少髮不白齒不落年三百餘歲不知能得度世不耳魏黃初三年京入衡山中去遂不復見京語皇甫隆曰治身之要當朝朝服玉泉使人丁壯有顔色去三蟲而堅齒也玉泉者口中液也朝未起早漱液滿口乃吞之琢齒二七過如此者三乃止名曰鍊精使人長生也夫交接之道至難非上士不能行之乘奔牛驚馬未足諭其嶮墜矣卿性多淫得無當用此自戒乎如京言慮隆不得度世也漢武帝外傳
